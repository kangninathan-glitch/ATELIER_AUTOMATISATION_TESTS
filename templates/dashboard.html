<!DOCTYPE html>
<html>
<head>
    <title>Dashboard API Tests</title>
</head>
<body>

<h1>Dashboard des tests API</h1>

<p><a href="/run">Lancer un nouveau test</a></p>

<h2>Historique des runs</h2>

<table border="1">
<tr>
    <th>Date</th>
    <th>Succès</th>
    <th>Echecs</th>
    <th>Total</th>
    <th>Taux d'erreur</th>
</tr>

{% for r in runs %}
<tr>
    <td>{{ r[0] }}</td>
    <td>{{ r[1] }}</td>
    <td>{{ r[2] }}</td>
    <td>{{ r[3] }}</td>
    <td>{{ r[4] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
